<!DOCTYPE html>
<html lang="nl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stamboom{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌳</text></svg>">
  <!-- Thema vóór render toepassen om flikkering te voorkomen -->
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-bs-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root, [data-bs-theme="light"] {
      --tree-line: #94a3b8;
      --tree-text: #1f2937;
      --tree-text-muted: #6b7280;
      --tree-bg: #ffffff;
      --box-bg-M: #dbeafe;  --box-border-M: #3b82f6;
      --box-bg-V: #fce7f3;  --box-border-V: #ec4899;
      --box-bg-X: #f3f4f6;  --box-border-X: #6b7280;
    }
    [data-bs-theme="dark"] {
      --tree-line: #4b5563;
      --tree-text: #e5e7eb;
      --tree-text-muted: #9ca3af;
      --tree-bg: #1e2530;
      --box-bg-M: #1e3a5f;  --box-border-M: #60a5fa;
      --box-bg-V: #4a1533;  --box-border-V: #f472b6;
      --box-bg-X: #374151;  --box-border-X: #9ca3af;
    }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .badge-M { background-color: #3b82f6; }
    .badge-V { background-color: #ec4899; }
    .badge-X { background-color: #6b7280; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-tree"></i> Stamboom</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/stamboom"><i class="bi bi-diagram-3"></i> Boom</a></li>
        <li class="nav-item"><a class="nav-link" href="/personen/"><i class="bi bi-people"></i> Personen</a></li>
        <li class="nav-item"><a class="nav-link" href="/relaties/"><i class="bi bi-heart"></i> Relaties</a></li>
        <li class="nav-item"><a class="nav-link" href="/gedcom/"><i class="bi bi-arrow-left-right"></i> GEDCOM</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <!-- Database-kiezer -->
        <div class="dropdown">
          <button class="btn btn-sm btn-outline-light dropdown-toggle" type="button"
                  data-bs-toggle="dropdown" aria-expanded="false" title="Wissel familie-database">
            <i class="bi bi-database-fill"></i> {{ request.state.actief_db }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end" style="min-width: 220px;">
            {% for db in request.state.databases %}
            <li>
              <form method="post" action="/databases/selecteer">
                <button type="submit" name="naam" value="{{ db }}"
                        class="dropdown-item {% if db == request.state.actief_db %}active{% endif %}">
                  <i class="bi bi-database{% if db == request.state.actief_db %}-fill{% endif %} me-1"></i>{{ db }}
                </button>
              </form>
            </li>
            {% endfor %}
            <li><hr class="dropdown-divider"></li>
            <li>
              <form method="post" action="/databases/nieuw" class="px-3 py-1">
                <div class="input-group input-group-sm">
                  <input type="text" name="naam" class="form-control"
                         placeholder="Naam nieuwe familie…"
                         pattern="[a-zA-Z0-9_\-]+" title="Alleen letters, cijfers, _ en -"
                         required maxlength="50">
                  <button type="submit" class="btn btn-outline-primary" title="Aanmaken">
                    <i class="bi bi-plus-lg"></i>
                  </button>
                </div>
              </form>
            </li>
          </ul>
        </div>
        <button id="theme-toggle" class="btn btn-sm btn-outline-light" title="Wissel thema">
          <i class="bi bi-moon-stars" id="theme-icon"></i>
        </button>
        <a href="/personen/nieuw" class="btn btn-sm btn-outline-light">
          <i class="bi bi-person-plus"></i> Nieuw persoon
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const toggle = document.getElementById('theme-toggle');
  const icon   = document.getElementById('theme-icon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-bs-theme', theme);
    icon.className = theme === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
    localStorage.setItem('theme', theme);
  }

  // Zet icoon correct bij laden
  applyTheme(document.documentElement.getAttribute('data-bs-theme') || 'dark');

  toggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
