<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stamboom{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .badge-M { background-color: #3b82f6; }
    .badge-V { background-color: #ec4899; }
    .badge-X { background-color: #6b7280; }
    .tree-container { width: 100%; min-height: 600px; background: #fff; border-radius: 8px; overflow: hidden; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-tree"></i> Stamboom</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/stamboom"><i class="bi bi-diagram-3"></i> Boom</a></li>
        <li class="nav-item"><a class="nav-link" href="/personen/"><i class="bi bi-people"></i> Personen</a></li>
        <li class="nav-item"><a class="nav-link" href="/relaties/"><i class="bi bi-heart"></i> Relaties</a></li>
        <li class="nav-item"><a class="nav-link" href="/gedcom/"><i class="bi bi-arrow-left-right"></i> GEDCOM</a></li>
      </ul>
      <a href="/personen/nieuw" class="btn btn-sm btn-outline-light">
        <i class="bi bi-person-plus"></i> Nieuw persoon
      </a>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
