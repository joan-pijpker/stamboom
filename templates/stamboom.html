{% extends "base.html" %}
{% block title %}Stamboom visualisatie{% endblock %}

{% block extra_head %}
<style>
  .tree-wrap {
    background: var(--tree-bg);
    border-radius: 8px;
    min-height: 70vh;
    overflow: hidden;
    border: 1px solid var(--bs-border-color);
  }
  #tree-svg { display: block; width: 100%; }
  .person-box { cursor: pointer; }
  .person-box .box-rect { transition: filter .15s; }
  .person-box:hover .box-rect { filter: brightness(0.92); }
  #filter-controls { display: none; }
  #filter-controls.visible { display: flex; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <h2 class="mb-0"><i class="bi bi-diagram-3"></i> Stamboom</h2>
  <div class="d-flex gap-2 align-items-center flex-wrap">
    <div class="btn-group btn-group-sm" role="group">
      <input type="radio" class="btn-check" name="modus" id="modus-volledig" value="volledig" autocomplete="off" checked>
      <label class="btn btn-outline-primary" for="modus-volledig">
        <i class="bi bi-diagram-3"></i> Volledig overzicht
      </label>
      <input type="radio" class="btn-check" name="modus" id="modus-filter" value="filter" autocomplete="off">
      <label class="btn btn-outline-primary" for="modus-filter">
        <i class="bi bi-funnel"></i> Uitsnede
      </label>
    </div>
    <div id="filter-controls" class="d-flex gap-2 align-items-center flex-wrap">
      <select id="focus-select" class="form-select form-select-sm" style="width: auto; min-width: 160px;">
        <option value="">— Kies persoon —</option>
        {% for p in personen %}
        <option value="{{ p.id }}" {% if p.id == focus %}selected{% endif %}>{{ p.volledige_naam }}</option>
        {% endfor %}
      </select>
      <div class="d-flex align-items-center gap-1">
        <label class="form-label mb-0 text-nowrap small">Omhoog:</label>
        <input type="number" id="lagen-omhoog" class="form-control form-control-sm" style="width: 65px;" min="0" max="10" value="4">
      </div>
      <div class="d-flex align-items-center gap-1">
        <label class="form-label mb-0 text-nowrap small">Omlaag:</label>
        <input type="number" id="lagen-omlaag" class="form-control form-control-sm" style="width: 65px;" min="0" max="10" value="3">
      </div>
      <button id="toon-btn" class="btn btn-primary btn-sm">
        <i class="bi bi-funnel-fill"></i> Tonen
      </button>
    </div>
  </div>
</div>

<div class="tree-wrap">
  <svg id="tree-svg"></svg>
</div>

<div class="mt-3 d-flex gap-3 small" style="color: var(--bs-secondary-color)">
  <span><i class="bi bi-arrows-move"></i> Slepen om te navigeren</span>
  <span><i class="bi bi-zoom-in"></i> Scroll om te zoomen</span>
  <span><i class="bi bi-cursor"></i> Klik op persoon voor details</span>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const BOOM_DATA = {{ boom_data | tojson }};
const FOCUS_ID  = {{ focus or 'null' }};

const BOX_W      = 158;
const BOX_H      = 70;
const BOX_R      = 7;
const GEN_H      = 220;   // ruimte voor koppelpaar + verbindingslijnen
const SLOT_W     = BOX_W + 45;
const COUPLE_GAP = 4;     // ruimte tussen de twee vakjes van een koppel

const nodeMap   = {};
const parentMap = {};
const childMap  = {};

BOOM_DATA.nodes.forEach(n => nodeMap[n.id] = n);
BOOM_DATA.links.forEach(l => {
  const kind  = typeof l.target === 'object' ? l.target.id : l.target;
  const ouder = typeof l.source === 'object' ? l.source.id : l.source;
  if (!parentMap[kind]) parentMap[kind] = [];
  if (parentMap[kind].length < 2) parentMap[kind].push(ouder);
  if (!childMap[ouder]) childMap[ouder] = [];
  if (!childMap[ouder].includes(kind)) childMap[ouder].push(kind);
});

const partnerMap = {};
(BOOM_DATA.partners || []).forEach(p => {
  if (!partnerMap[p.a]) partnerMap[p.a] = [];
  if (!partnerMap[p.b]) partnerMap[p.b] = [];
  if (!partnerMap[p.a].includes(p.b)) partnerMap[p.a].push(p.b);
  if (!partnerMap[p.b].includes(p.a)) partnerMap[p.b].push(p.a);
});

// ─── Hulpfuncties ─────────────────────────────────────────────────────────

function drawLine(parent, x1, y1, x2, y2) {
  parent.append('line')
    .attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2)
    .attr('stroke', 'var(--tree-line)').attr('stroke-width', 2);
}

function renderBox(g, id, p, highlight) {
  const person = nodeMap[id];
  if (!person || !p) return;
  const gs  = person.geslacht || 'X';
  const grp = g.append('g')
    .attr('class', 'person-box')
    .attr('transform', `translate(${p.x},${p.y})`)
    .on('click', () => window.location.href = `/personen/${id}`);

  grp.append('rect')
    .attr('class', 'box-rect')
    .attr('x', -BOX_W / 2).attr('y', -BOX_H / 2)
    .attr('width', BOX_W).attr('height', BOX_H).attr('rx', BOX_R)
    .style('fill',   `var(--box-bg-${gs})`)
    .style('stroke', highlight ? 'var(--bs-warning)' : `var(--box-border-${gs})`)
    .attr('stroke-width', highlight ? 3 : 2);

  const symbol = gs === 'M' ? '♂' : gs === 'V' ? '♀' : '⚬';
  const ix = -BOX_W / 2 + 14, iy = -BOX_H / 2 + 13;
  grp.append('circle').attr('cx', ix).attr('cy', iy).attr('r', 9)
    .style('fill', `var(--box-border-${gs})`).style('fill-opacity', '.18')
    .style('stroke', `var(--box-border-${gs})`).attr('stroke-width', 1.5);
  grp.append('text').attr('x', ix).attr('y', iy + 4)
    .attr('text-anchor', 'middle').attr('font-size', '11px')
    .style('fill', `var(--box-border-${gs})`).text(symbol);

  grp.append('text').attr('text-anchor', 'middle').attr('y', -10)
    .attr('font-size', '13px').attr('font-weight', '700')
    .style('fill', 'var(--tree-text)').text(person.voornaam);
  grp.append('text').attr('text-anchor', 'middle').attr('y', 6)
    .attr('font-size', '12px').style('fill', 'var(--tree-text)').text(person.achternaam);

  let jaren = '';
  if (person.geboorte_jaar && person.sterf_jaar) jaren = `${person.geboorte_jaar}–${person.sterf_jaar}`;
  else if (person.geboorte_jaar) jaren = `* ${person.geboorte_jaar}`;
  else if (person.sterf_jaar)    jaren = `† ${person.sterf_jaar}`;
  if (jaren) {
    grp.append('text').attr('text-anchor', 'middle').attr('y', 24)
      .attr('font-size', '10px').style('fill', 'var(--tree-text-muted)').text(jaren);
  }
}

// ─── Volledige stamboom ────────────────────────────────────────────────────

function drawFullTree() {
  const svgEl = document.getElementById('tree-svg');
  const viewW = svgEl.clientWidth || 900;
  const viewH = Math.max(window.innerHeight * 0.68, 500);
  svgEl.setAttribute('height', viewH);
  const svg = d3.select('#tree-svg');
  svg.selectAll('*').remove();
  svg.attr('viewBox', `0 0 ${viewW} ${viewH}`);

  if (!BOOM_DATA.nodes.length) {
    svg.append('text').attr('x', viewW / 2).attr('y', viewH / 2)
      .attr('text-anchor', 'middle').attr('fill', 'var(--tree-text-muted)').attr('font-size', '16px')
      .text('Geen personen gevonden. Voeg personen toe om de stamboom te zien.');
    return;
  }

  // Generatieniveau = langste pad van een root naar dit knooppunt
  const gen = {};
  BOOM_DATA.nodes.forEach(n => { gen[n.id] = 0; });
  let changed = true;
  while (changed) {
    changed = false;
    BOOM_DATA.nodes.forEach(n => {
      const pp = parentMap[n.id] || [];
      if (!pp.length) return;
      const newG = Math.max(...pp.map(p => gen[p])) + 1;
      if (newG > gen[n.id]) { gen[n.id] = newG; changed = true; }
    });
  }

  // Bepaal welke personen als "aangetrouwd" (secondary) onder hun partner komen
  // Regel: geen eigen ouders in de data + partner heeft wel ouders → secondary
  // Als beide roots: degene met het hogere id is secondary
  const secondaries = new Set();
  BOOM_DATA.nodes.forEach(n => {
    const nHasParents = (parentMap[n.id] || []).length > 0;
    if (nHasParents) return;
    (partnerMap[n.id] || []).forEach(pid => {
      const pHasParents = (parentMap[pid] || []).length > 0;
      if (pHasParents || n.id > pid) secondaries.add(n.id);
    });
  });

  // Subboombreedtes: tel kinderen van primaire + aangetrouwde partner mee
  function subtreeW(id, seen = new Set()) {
    if (seen.has(id) || secondaries.has(id)) return SLOT_W;
    seen.add(id);
    const allKids = new Set(childMap[id] || []);
    (partnerMap[id] || []).filter(p => secondaries.has(p))
      .forEach(p => (childMap[p] || []).forEach(c => allKids.add(c)));
    const kidsArr = [...allKids].filter(c => nodeMap[c] && !seen.has(c));
    return kidsArr.length
      ? Math.max(SLOT_W, kidsArr.reduce((s, c) => s + subtreeW(c, new Set(seen)), 0))
      : SLOT_W;
  }

  // Plaatsing: primary op generatierij, secondary direct daaronder
  const pos = {};
  function placeNode(id, x, seen = new Set()) {
    if (pos[id] !== undefined || seen.has(id) || secondaries.has(id)) return;
    seen.add(id);
    pos[id] = { x, y: gen[id] * GEN_H };

    // Aangetrouwde partner(s) direct onder de primary
    let secY = gen[id] * GEN_H + BOX_H + COUPLE_GAP;
    (partnerMap[id] || []).forEach(pid => {
      if (secondaries.has(pid) && pos[pid] === undefined) {
        pos[pid] = { x, y: secY };
        secY += BOX_H + COUPLE_GAP;
      }
    });

    // Kinderen van primary én aangetrouwde partner(s)
    const allKids = new Set(childMap[id] || []);
    (partnerMap[id] || []).filter(p => secondaries.has(p))
      .forEach(p => (childMap[p] || []).forEach(c => allKids.add(c)));
    const kidsArr = [...allKids].filter(c => nodeMap[c] && pos[c] === undefined && !seen.has(c));
    if (!kidsArr.length) return;

    const totalW = kidsArr.reduce((s, c) => s + subtreeW(c, new Set(seen)), 0);
    let cx = x - totalW / 2;
    kidsArr.forEach(c => {
      const w = subtreeW(c, new Set(seen));
      placeNode(c, cx + w / 2, new Set(seen));
      cx += w;
    });
  }

  // Roots: alleen primaire personen (geen secondaries)
  const roots = BOOM_DATA.nodes
    .filter(n => !(parentMap[n.id] || []).length && !secondaries.has(n.id))
    .sort((a, b) => a.id - b.id);

  let offsetX = 0;
  roots.forEach(root => {
    const w = subtreeW(root.id);
    placeNode(root.id, offsetX + w / 2);
    offsetX += w + SLOT_W * 0.5;
  });

  // Nog niet geplaatste personen (volledig geïsoleerd)
  BOOM_DATA.nodes.forEach(n => {
    if (pos[n.id] === undefined) { pos[n.id] = { x: offsetX, y: 0 }; offsetX += SLOT_W; }
  });

  // Centreer alle posities rond x=0
  const allX = Object.values(pos).map(p => p.x);
  const midX = (Math.min(...allX) + Math.max(...allX)) / 2;
  Object.values(pos).forEach(p => { p.x -= midX; });

  // Auto-fit zoom
  const allPos = Object.values(pos);
  const pad = BOX_W * 0.6;
  const bx  = Math.min(...allPos.map(p => p.x)) - pad;
  const by  = Math.min(...allPos.map(p => p.y)) - pad;
  const bw  = Math.max(...allPos.map(p => p.x)) - bx + pad * 2;
  const bh  = Math.max(...allPos.map(p => p.y)) - by + pad * 2;
  const sc  = Math.min(viewW / bw, viewH / bh, 1) * 0.9;
  const tx  = viewW / 2 - sc * (bx + bw / 2);
  const ty  = viewH / 2 - sc * (by + bh / 2);

  const g    = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(sc));

  const linesG = g.append('g');

  // Verbindingen per gezinsgroep
  const families = {};
  BOOM_DATA.nodes.forEach(n => {
    if (!pos[n.id]) return;
    const pp = (parentMap[n.id] || []).filter(p => pos[p]).sort((a, b) => a - b);
    if (!pp.length) return;
    const key = pp.join('-');
    if (!families[key]) families[key] = { parents: pp, children: [] };
    families[key].children.push(n.id);
  });

  Object.values(families).forEach(({ parents, children }) => {
    const sameX = parents.every(p => pos[p].x === pos[parents[0]].x);
    if (sameX) {
      // Verticaal koppel: lijn vanaf onderkant van het laagste vakje
      const fx      = pos[parents[0]].x;
      const bottomY = Math.max(...parents.map(p => pos[p].y)) + BOX_H / 2;
      const kidTopY = pos[children[0]].y - BOX_H / 2;
      const jY      = bottomY + (kidTopY - bottomY) / 2;
      drawLine(linesG, fx, bottomY, fx, jY);
      const xs = children.map(c => pos[c].x);
      if (Math.min(...xs) < Math.max(...xs) || xs[0] !== fx)
        drawLine(linesG, Math.min(...xs, fx), jY, Math.max(...xs, fx), jY);
      children.forEach(c => drawLine(linesG, pos[c].x, pos[c].y - BOX_H / 2, pos[c].x, jY));
    } else {
      // Horizontale ouders (beide uit eigen familielijn)
      const parY  = pos[parents[0]].y;
      const kidY  = pos[children[0]].y;
      const jY    = parY + BOX_H / 2 + (kidY - parY - BOX_H) / 2;
      const allXs = [...parents.map(p => pos[p].x), ...children.map(c => pos[c].x)];
      drawLine(linesG, Math.min(...allXs), jY, Math.max(...allXs), jY);
      parents.forEach(pid  => drawLine(linesG, pos[pid].x, pos[pid].y + BOX_H / 2, pos[pid].x, jY));
      children.forEach(cid => drawLine(linesG, pos[cid].x, pos[cid].y - BOX_H / 2, pos[cid].x, jY));
    }
  });

  Object.keys(pos).forEach(idStr => renderBox(g, +idStr, pos[+idStr], false));
}

// ─── Uitsnede (gefilterd op persoon + lagen) ──────────────────────────────

function drawFilteredTree(focusId, maxUp, maxDown) {
  const svgEl = document.getElementById('tree-svg');
  const viewW = svgEl.clientWidth || 900;
  const viewH = Math.max(window.innerHeight * 0.68, 500);
  svgEl.setAttribute('height', viewH);
  const svg = d3.select('#tree-svg');
  svg.selectAll('*').remove();
  svg.attr('viewBox', `0 0 ${viewW} ${viewH}`);

  if (!focusId || !nodeMap[focusId]) {
    svg.append('text').attr('x', viewW / 2).attr('y', viewH / 2)
      .attr('text-anchor', 'middle').attr('fill', 'var(--tree-text-muted)').attr('font-size', '16px')
      .text('Kies een persoon om een uitsnede te bekijken.');
    return;
  }

  const pos = {};

  // Voorouders omhoog (slot-gebaseerd)
  const ancSlots = {};
  function assignAnc(id, gen, slot) {
    if (!id || gen > maxUp || !nodeMap[id] || ancSlots[id]) return;
    ancSlots[id] = { gen, slot };
    const pp = parentMap[id] || [];
    if (pp[0]) assignAnc(pp[0], gen + 1, 2 * slot);
    if (pp[1]) assignAnc(pp[1], gen + 1, 2 * slot + 1);
  }
  assignAnc(focusId, 0, 0);

  const maxAncGen = Math.max(0, ...Object.values(ancSlots).map(s => s.gen));
  const ancWidth  = Math.pow(2, maxAncGen) * SLOT_W;
  Object.entries(ancSlots).forEach(([id, { gen, slot }]) => {
    const sw = ancWidth / Math.pow(2, gen);
    pos[id] = { x: slot * sw + sw / 2 - ancWidth / 2, y: -gen * GEN_H };
  });

  // Partner(s) van de focuspersoon verticaal onder hem/haar plaatsen
  const focusPartners = (partnerMap[focusId] || []).filter(p => nodeMap[p] && !pos[p]);
  focusPartners.forEach((pid, i) => {
    pos[pid] = { x: pos[focusId].x, y: pos[focusId].y + (BOX_H + COUPLE_GAP) * (i + 1) };
  });

  const descCenterX = pos[focusId].x;

  // Nakomelingen omlaag
  function descW(id, depth, seen = new Set()) {
    if (depth >= maxDown || seen.has(id)) return SLOT_W;
    seen.add(id);
    const kids = (childMap[id] || []).filter(c => nodeMap[c] && !seen.has(c));
    return kids.length
      ? Math.max(SLOT_W, kids.reduce((s, c) => s + descW(c, depth + 1, new Set(seen)), 0))
      : SLOT_W;
  }
  function placeDesc(id, x, y, depth, seen = new Set()) {
    if (depth >= maxDown || seen.has(id)) return;
    seen.add(id);
    const kids = (childMap[id] || []).filter(c => nodeMap[c] && !seen.has(c));
    if (!kids.length) return;
    const totalW = kids.reduce((s, c) => s + descW(c, depth + 1, new Set(seen)), 0);
    let cx = x - totalW / 2;
    kids.forEach(c => {
      const w = descW(c, depth + 1, new Set(seen));
      if (!pos[c]) pos[c] = { x: cx + w / 2, y: y + GEN_H };
      placeDesc(c, cx + w / 2, y + GEN_H, depth + 1, new Set(seen));
      cx += w;
    });
  }

  // Kinderen van focuspersoon én partner(s) samen plaatsen
  const allFocusKids = new Set(childMap[focusId] || []);
  focusPartners.forEach(pid => (childMap[pid] || []).forEach(c => allFocusKids.add(c)));
  const focusKidsArr = [...allFocusKids].filter(c => nodeMap[c]);
  if (maxDown > 0 && focusKidsArr.length) {
    const totalW = focusKidsArr.reduce((s, c) => s + descW(c, 1, new Set()), 0);
    let cx = descCenterX - totalW / 2;
    focusKidsArr.forEach(c => {
      const w = descW(c, 1, new Set());
      if (!pos[c]) pos[c] = { x: cx + w / 2, y: GEN_H };
      placeDesc(c, cx + w / 2, GEN_H, 1, new Set());
      cx += w;
    });
  }

  // Zoom: focuspersoon gecentreerd
  const g    = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
  const initTy = viewH / 2 + maxAncGen * GEN_H * 0.3 + BOX_H;
  svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(viewW / 2, initTy));

  const linesG = g.append('g');

  // Verbindingen voorouders
  Object.keys(ancSlots).forEach(idStr => {
    const id     = +idStr;
    const child  = pos[id];
    const ouders = (parentMap[id] || []).filter(pid => pos[pid]);
    if (!ouders.length) return;
    const jY = child.y - BOX_H / 2 - (GEN_H - BOX_H) / 2;
    drawLine(linesG, child.x, child.y - BOX_H / 2, child.x, jY);
    if (ouders.length === 2) {
      const p0 = pos[ouders[0]], p1 = pos[ouders[1]];
      drawLine(linesG, p0.x, jY, p1.x, jY);
      drawLine(linesG, p0.x, p0.y + BOX_H / 2, p0.x, jY);
      drawLine(linesG, p1.x, p1.y + BOX_H / 2, p1.x, jY);
    } else {
      const pp0 = pos[ouders[0]];
      drawLine(linesG, pp0.x, pp0.y + BOX_H / 2, pp0.x, jY);
      if (pp0.x !== child.x) drawLine(linesG, pp0.x, jY, child.x, jY);
    }
  });

  // Verbindingen nakomelingen: groepeer per gezinsgroep (voorkomt dubbele lijnen)
  const families = {};
  Object.keys(pos).forEach(idStr => {
    const id = +idStr;
    if (ancSlots[id] || id === focusId || focusPartners.includes(id)) return;
    const pp = (parentMap[id] || []).filter(p => pos[p]).sort((a, b) => a - b);
    if (!pp.length) return;
    const key = pp.join('-');
    if (!families[key]) families[key] = { parents: pp, children: [] };
    families[key].children.push(id);
  });
  Object.values(families).forEach(({ parents, children }) => {
    const sameX = parents.every(p => pos[p].x === pos[parents[0]].x);
    if (sameX) {
      const fx      = pos[parents[0]].x;
      const bottomY = Math.max(...parents.map(p => pos[p].y)) + BOX_H / 2;
      const kidTopY = pos[children[0]].y - BOX_H / 2;
      const jY      = bottomY + (kidTopY - bottomY) / 2;
      drawLine(linesG, fx, bottomY, fx, jY);
      const xs = children.map(c => pos[c].x);
      if (Math.min(...xs) < Math.max(...xs) || xs[0] !== fx)
        drawLine(linesG, Math.min(...xs, fx), jY, Math.max(...xs, fx), jY);
      children.forEach(c => drawLine(linesG, pos[c].x, pos[c].y - BOX_H / 2, pos[c].x, jY));
    } else {
      const parY  = pos[parents[0]].y;
      const kidY  = pos[children[0]].y;
      const jY    = parY + BOX_H / 2 + (kidY - parY - BOX_H) / 2;
      const allXs = [...parents.map(p => pos[p].x), ...children.map(c => pos[c].x)];
      drawLine(linesG, Math.min(...allXs), jY, Math.max(...allXs), jY);
      parents.forEach(pid  => drawLine(linesG, pos[pid].x, pos[pid].y + BOX_H / 2, pos[pid].x, jY));
      children.forEach(cid => drawLine(linesG, pos[cid].x, pos[cid].y - BOX_H / 2, pos[cid].x, jY));
    }
  });

  Object.keys(pos).forEach(idStr => {
    const id = +idStr;
    renderBox(g, id, pos[id], id === focusId);
  });
}

// ─── Weergave starten ─────────────────────────────────────────────────────

function render() {
  const modus = document.querySelector('input[name="modus"]:checked').value;
  if (modus === 'volledig') {
    drawFullTree();
  } else {
    const focusId = +document.getElementById('focus-select').value || null;
    const maxUp   = Math.max(0, +document.getElementById('lagen-omhoog').value || 0);
    const maxDown = Math.max(0, +document.getElementById('lagen-omlaag').value || 0);
    drawFilteredTree(focusId, maxUp, maxDown);
  }
}

document.querySelectorAll('input[name="modus"]').forEach(r =>
  r.addEventListener('change', function () {
    document.getElementById('filter-controls').classList.toggle('visible', this.value === 'filter');
    render();
  })
);

document.getElementById('toon-btn').addEventListener('click', render);
document.getElementById('focus-select').addEventListener('change', render);

// Bij URL-parameter focus: schakel naar uitsnede-modus
if (FOCUS_ID) {
  document.getElementById('modus-filter').checked = true;
  document.getElementById('filter-controls').classList.add('visible');
}
render();
</script>
{% endblock %}
